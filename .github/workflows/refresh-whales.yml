name: Refresh Whale Data

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch whale data
        run: node whale-refresh.mjs
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          ARKHAM_API_KEY: ${{ secrets.ARKHAM_API_KEY }}

      - name: Commit and push whale-data.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add whale-data.js
          git diff --staged --quiet || git commit -m "chore: auto-refresh whale data"
          git pull --rebase
          git push
