<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>INX Price Chart — Infinex</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="sonar.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .chart-wrapper {
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            box-shadow: var(--card-shadow);
            background: #0a0a0a;
            height: 560px;
        }
        .chart-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        @media (max-width: 768px) {
            .chart-wrapper { height: 420px; }
        }

        .whale-feed {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 340px;
            overflow-y: auto;
            padding-right: 4px;
        }
        .whale-feed::-webkit-scrollbar { width: 4px; }
        .whale-feed::-webkit-scrollbar-track { background: transparent; }
        .whale-feed::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

        .wf-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: 10px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            font-family: var(--font-mono);
            font-size: 12px;
        }
        .wf-badge {
            padding: 3px 10px;
            border-radius: 100px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.3px;
            flex-shrink: 0;
            min-width: 54px;
            text-align: center;
        }
        .wf-badge.buy  { background: rgba(247,107,28,0.12); color: #F76B1C; border: 1px solid rgba(247,107,28,0.3); }
        .wf-badge.sell { background: rgba(136,136,136,0.10); color: #aaa;   border: 1px solid rgba(136,136,136,0.25); }
        .wf-amount { color: var(--text-primary); font-weight: 700; flex: 1; }
        .wf-label  { color: var(--accent-color); }
        .wf-addr   { color: var(--text-tertiary); }
        .wf-time   { color: var(--text-tertiary); flex-shrink: 0; }
    </style>
</head>

<body>

    <div class="loader-screen" id="loaderScreen">
        <div class="loader-content">
            <div class="loader-logo">
                <img src="./icons/Infinex_Logo_Cantaloupe.svg" alt="Infinex Logo">
                <div class="loader-glow"></div>
            </div>
            <div class="loader-bar">
                <div class="loader-progress" id="loaderProgress"></div>
            </div>
            <p class="loader-text">Loading Chart...</p>
        </div>
    </div>

    <nav class="page-nav">
        <a href="/" class="nav-link">Leaderboard</a>
        <a href="/sonar" class="nav-link">Sonar Analytics</a>
        <a href="/whales" class="nav-link">Whale Tracker</a>
        <a href="/chart" class="nav-link active">Chart</a>
    </nav>

    <div class="container sonar-container">

        <header class="sonar-header">
            <div class="logo-wrapper">
                <img src="./icons/Infinex_Logo_Cantaloupe.svg" alt="Infinex Logo">
                <div class="logo-glow"></div>
            </div>
            <h1>INX Price Chart</h1>
            <p class="subtitle">INX/USD · Uniswap V4 · GeckoTerminal</p>
            <div class="last-updated" id="priceBadge">
                <span class="last-updated-dot"></span>
                <span id="priceText">Loading...</span>
            </div>
        </header>

        <section class="section">
            <div class="chart-wrapper">
                <iframe
                    src="https://www.geckoterminal.com/eth/pools/0xdb66b18431f00e001867c67c6022c36205abec136381cd0d3fa58068ec88ace6?embed=1&info=0&swaps=1&grayscale=0&light_chart=0"
                    title="INX/USDC price chart"
                    allowfullscreen>
                </iframe>
            </div>
        </section>

        <section class="section">
            <div class="section-header">
                <span class="section-eyebrow">On-chain Activity</span>
                <h2 class="section-title">Whale Buy / Sell</h2>
            </div>
            <div class="whale-feed" id="whaleFeed"></div>
        </section>

    </div>

    <footer>
        <a href="https://infinex.xyz" target="_blank" rel="noopener">infinex.xyz</a>
        <span class="separator">•</span>
        <a href="https://x.com/infinex" target="_blank" rel="noopener">@infinex</a>
        <span class="separator">•</span>
        <a href="https://x.com/0xAirr" target="_blank" rel="noopener">@0xAirr</a>
        <a href="https://x.com/MazinoTower" target="_blank" rel="noopener">@MazinoTower</a>
    </footer>

    <script src="whale-data.js"></script>
    <script>
    // ── Loader ───────────────────────────────────────────
    const loaderScreen   = document.getElementById('loaderScreen');
    const loaderProgress = document.getElementById('loaderProgress');
    let progress = 0;

    function updateLoader() {
        progress += Math.random() * 18 + 6;
        if (progress > 100) progress = 100;
        loaderProgress.style.width = progress + '%';
        if (progress < 100) {
            setTimeout(updateLoader, 130);
        } else {
            setTimeout(() => {
                loaderScreen.classList.add('fade-out');
                setTimeout(() => { loaderScreen.style.display = 'none'; }, 500);
            }, 300);
        }
    }

    // ── Price badge ──────────────────────────────────────
    async function fetchPrice() {
        try {
            const res   = await fetch('/api/inx-price');
            const { price } = await res.json();
            if (price != null) {
                document.getElementById('priceText').textContent =
                    '$' + price.toFixed(price < 0.01 ? 6 : 4) + ' USD';
            }
        } catch { /* leave as Loading... */ }
    }

    // ── Whale feed ───────────────────────────────────────
    function fmtAmt(n) {
        if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M INX';
        if (n >= 1e3) return Math.round(n / 1e3) + 'K INX';
        return n.toLocaleString() + ' INX';
    }

    function fmtTime(ts) {
        return new Date(ts * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function shortAddr(addr) {
        return addr.slice(0, 6) + '…' + addr.slice(-4);
    }

    function makeEmptyRow(msg) {
        const div = document.createElement('div');
        div.style.cssText = 'color:var(--text-tertiary);font-size:13px;padding:20px;text-align:center';
        div.textContent = msg;
        return div;
    }

    function makeWhaleRow(tx) {
        const isBuy = tx.type === 'buy';

        const row = document.createElement('div');
        row.className = 'wf-row';

        const badge = document.createElement('span');
        badge.className = 'wf-badge ' + tx.type;
        badge.textContent = tx.type.toUpperCase();
        row.appendChild(badge);

        const amt = document.createElement('span');
        amt.className = 'wf-amount';
        amt.textContent = fmtAmt(tx.amount);
        row.appendChild(amt);

        const addrKey  = isBuy ? tx.to : tx.from;
        const label    = (typeof WHALE_LABELS !== 'undefined') ? WHALE_LABELS[addrKey] : null;
        const addrSpan = document.createElement('span');
        addrSpan.className = label ? 'wf-label' : 'wf-addr';
        addrSpan.textContent = label || shortAddr(addrKey);
        row.appendChild(addrSpan);

        const time = document.createElement('span');
        time.className = 'wf-time';
        time.textContent = fmtTime(tx.ts);
        row.appendChild(time);

        return row;
    }

    function renderWhaleFeed() {
        const feed = document.getElementById('whaleFeed');
        feed.textContent = '';

        if (typeof WHALE_TRANSFERS === 'undefined') {
            feed.appendChild(makeEmptyRow('No data available.'));
            return;
        }

        const txs = WHALE_TRANSFERS
            .filter(tx => tx.type === 'buy' || tx.type === 'sell')
            .sort((a, b) => b.ts - a.ts);

        if (!txs.length) {
            feed.appendChild(makeEmptyRow('No whale buys or sells in the last 24h.'));
            return;
        }

        const frag = document.createDocumentFragment();
        txs.forEach(tx => frag.appendChild(makeWhaleRow(tx)));
        feed.appendChild(frag);
    }

    // ── Init ─────────────────────────────────────────────
    fetchPrice().then(() => updateLoader());
    renderWhaleFeed();
    </script>

</body>
</html>
